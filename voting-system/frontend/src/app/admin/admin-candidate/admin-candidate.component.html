<h2>Manage Candidates</h2>
<form (ngSubmit)="addCandidate()">
  <input type="text" [(ngModel)]="newCandidate.name" name="name" placeholder="Name" required>
  <input type="text" [(ngModel)]="newCandidate.party" name="party" placeholder="Party" required>
  <button type="submit">Add Candidate</button>
</form>

<ul>
  <li *ngFor="let c of candidates">
    {{ c.name }} - {{ c.party }}
    <button (click)="deleteCandidate(c.id)">Delete</button>
  </li>
</ul>
